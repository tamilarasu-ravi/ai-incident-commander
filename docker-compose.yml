# Local development only — app + PostgreSQL with source hot reload.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: incident
      POSTGRES_PASSWORD: incident
      POSTGRES_DB: incident_commander
    # Not published to host — app reaches db via Docker network. Use:
    #   docker compose exec db psql -U incident -d incident_commander
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident -d incident_commander"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://incident:incident@db:5432/incident_commander
      RUNNING_IN_DOCKER: "1"
      REDIS_URL: redis://127.0.0.1:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "uvicorn",
        "ai_incident_commander.server.main:api",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

volumes:
  postgres_data:
